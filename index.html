<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARGUS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a0f;--bg2:#0d1017;--bg3:#131720;--bg4:#1a1f2e;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#e8eaf0;--text2:#9da3b4;--text3:#5a6175;--text4:#3a3f52;
  --accent:#00d4ff;--accent2:rgba(0,212,255,0.1);
  --green:#00e676;--green2:rgba(0,230,118,0.1);
  --red:#ff4569;--red2:rgba(255,69,105,0.1);
  --amber:#ffaa00;--amber2:rgba(255,170,0,0.1);
  --purple:#b980ff;--purple2:rgba(185,128,255,0.1);
  --pink:#ff6ef7;
  --fd:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-weight:300;line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

#topnav{background:rgba(8,10,15,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.ni{max-width:1140px;margin:0 auto;padding:0 24px;display:flex;align-items:stretch;justify-content:space-between}
.logo{font-family:var(--fd);font-size:28px;letter-spacing:0.18em;padding:11px 0;cursor:pointer;color:#fff;user-select:none;transition:opacity 0.2s}
.logo:hover{opacity:0.7}
.logo-dot{color:var(--accent)}
.navlinks{display:flex;align-items:stretch}
.nl{font-family:var(--fm);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);padding:0 14px;display:flex;align-items:center;border-left:1px solid var(--border);cursor:pointer;transition:all 0.2s;position:relative;white-space:nowrap}
.nl:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.nl.on{color:var(--accent)}
.nl.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent)}
.ndate{font-family:var(--fm);font-size:10px;color:var(--text4);padding:0 18px;border-left:1px solid var(--border);display:flex;align-items:center;letter-spacing:0.06em}
#backbtn{position:fixed;left:20px;bottom:28px;z-index:200;-webkit-tap-highlight-color:transparent;background:var(--bg3);color:var(--accent);border:1px solid var(--accent);border-radius:50%;width:44px;height:44px;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all 0.2s}
#backbtn:hover{background:var(--accent);color:var(--bg)}
#backbtn.show{display:flex}
.bc{max-width:1140px;margin:0 auto;padding:10px 24px;font-family:var(--fm);font-size:11px;color:var(--text4);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-wrap:wrap;letter-spacing:0.05em}
.bcl{color:var(--text3);cursor:pointer;transition:color 0.15s}.bcl:hover{color:var(--accent)}
.bcs{color:var(--text4)}.bcc{color:var(--text2);font-weight:500}
.wrap{max-width:1140px;margin:0 auto;padding:0 24px}
.chip{font-family:var(--fm);font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid;white-space:nowrap;display:inline-block;letter-spacing:0.04em}
.cw{background:var(--green2);color:var(--green);border-color:rgba(0,230,118,0.25)}
.ch{background:var(--amber2);color:var(--amber);border-color:rgba(255,170,0,0.25)}
.ca{background:var(--accent2);color:var(--accent);border-color:rgba(0,212,255,0.25)}
.cg{background:var(--amber2);color:var(--amber);border-color:rgba(255,170,0,0.2)}
.cl{background:var(--red2);color:var(--red);border-color:rgba(255,69,105,0.25)}
.cr{background:var(--bg3);color:var(--text2);border-color:var(--border2)}
.slabel{font-family:var(--fd);font-size:18px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);padding-bottom:10px;border-bottom:1px solid var(--border2);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.slr{color:var(--accent);font-family:var(--fm);font-size:11px;letter-spacing:0.1em}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0;box-shadow:0 0 6px var(--green)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
.narr-tag{display:inline-flex;align-items:center;gap:5px;font-family:var(--fm);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 9px;border-radius:3px;border:1px solid;font-weight:500}
.narr-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.rank-reason{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--text2);line-height:1.6}
.rank-reason-label{font-family:var(--fm);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.missing-block{background:rgba(255,170,0,0.04);border:1px solid rgba(255,170,0,0.2);border-radius:8px;padding:14px 18px;margin-bottom:20px}
.missing-label{font-family:var(--fm);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--amber);margin-bottom:8px}
.missing-item{font-size:13px;color:var(--text2);line-height:1.65;padding:3px 0;display:flex;gap:8px;align-items:start}
.missing-bullet{color:var(--amber);flex-shrink:0}

/* FRONT */
.masthead{padding:48px 0 32px;position:relative;overflow:hidden}
.masthead::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse,rgba(0,212,255,0.07) 0%,transparent 70%);pointer-events:none}
.mey{font-family:var(--fm);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.mey::before{content:'';width:24px;height:1px;background:var(--accent)}
.mh1{font-family:var(--fd);font-size:clamp(64px,10vw,128px);letter-spacing:0.04em;line-height:0.88;margin-bottom:10px}
.mh1 em{color:var(--accent);font-style:normal}
.mtag{font-size:15px;color:var(--text2);margin-bottom:20px;max-width:480px}
.mmeta{display:flex;gap:24px;font-family:var(--fm);font-size:11px;color:var(--text3);letter-spacing:0.06em;flex-wrap:wrap}
.rn-section{margin:24px 0 0}
.rn-items{display:flex;flex-direction:column;gap:2px;margin-top:12px}
.rn-item{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px 16px}
.rn-clickable{transition:border-color 0.15s,background 0.15s;-webkit-tap-highlight-color:transparent}
.rn-clickable:hover{border-color:var(--border2);background:var(--bg3)}
.rn-item.live{border-left:2px solid var(--red)}
.rn-bullet{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.rn-text{font-size:14px;color:var(--text);flex:1}
.rn-room{font-family:var(--fm);font-size:10px;color:var(--text4);letter-spacing:0.06em;flex-shrink:0}
.rn-time{font-family:var(--fm);font-size:10px;flex-shrink:0}
.feed-grid{display:flex;flex-direction:column;gap:2px;margin-top:12px}
.feed-card{display:grid;grid-template-columns:40px 1fr auto;gap:14px;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px 16px;cursor:pointer;transition:border-color 0.2s,background 0.2s}
.feed-card:hover{border-color:var(--border2);background:var(--bg3)}
.feed-card:hover .feed-title{color:var(--accent)}
.feed-rank{font-family:var(--fd);font-size:28px;letter-spacing:0.02em;color:var(--text4);line-height:1;text-align:center}
.feed-rank.top3{color:var(--accent)}
.feed-room{font-family:var(--fm);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text4);margin-bottom:3px}
.feed-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.35;margin-bottom:4px;transition:color 0.2s}
.feed-src{font-family:var(--fm);font-size:10px;color:var(--text3);letter-spacing:0.04em;display:flex;align-items:center;gap:6px}
.feed-scores{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0}
.feed-score-row{display:flex;align-items:center;gap:6px}
.feed-score-label{font-family:var(--fm);font-size:9px;color:var(--text4);letter-spacing:0.06em;width:20px;text-align:right}
.feed-score-bar{width:60px;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden}
.feed-score-fill{height:100%;border-radius:1px}
.feed-score-num{font-family:var(--fm);font-size:10px;color:var(--text3);width:26px;text-align:right}
.sbroom{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px 16px;cursor:pointer;transition:all 0.2s;margin-bottom:2px}
.sbroom:hover{border-color:var(--border2);background:var(--bg3)}
.sbroom:hover .sbtitle{color:var(--accent)}
.sblabel{font-family:var(--fm);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text4);margin-bottom:4px}
.sbtitle{font-size:13px;font-weight:500;color:var(--text);line-height:1.3;margin-bottom:8px;transition:color 0.2s}
.sbmeta{display:flex;justify-content:space-between;font-family:var(--fm);font-size:10px;color:var(--text3)}
.sbwin{color:var(--green)}
.abar{display:flex;gap:2px;align-items:flex-end;height:12px;margin-top:8px}
.ab{width:5px;background:var(--bg4);border-radius:1px}.ab.on{background:var(--accent)}
.gap-sb-item{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:2px;cursor:pointer;transition:border-color 0.2s}
.gap-sb-item:hover{border-color:var(--border2)}
.gap-sb-label{font-family:var(--fm);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
.gap-sb-title{font-size:12px;font-weight:500;color:var(--text);line-height:1.3;margin-bottom:4px}
.gap-sb-meta{font-family:var(--fm);font-size:10px;color:var(--text3)}

/* ROOMS INDEX */
.rihdr{padding:32px 0 20px}
.rih1{font-family:var(--fd);font-size:clamp(36px,6vw,72px);letter-spacing:0.04em;margin-bottom:6px}
.rip{font-size:14px;color:var(--text2);max-width:500px}
.rigrid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:24px}
.ricard{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:24px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.ricard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transition:transform 0.3s;transform-origin:left}
.ricard:hover{border-color:var(--border2);background:var(--bg3)}
.ricard:hover::after{transform:scaleX(1)}
.ricard:hover .rict{color:var(--accent)}
.rilabel{font-family:var(--fm);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.rict{font-family:var(--fd);font-size:26px;letter-spacing:0.03em;color:var(--text);line-height:1.1;margin-bottom:10px;transition:color 0.2s}
.ridesc{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:14px}
.ristats{display:flex;gap:14px;font-family:var(--fm);font-size:10px;color:var(--text3);margin-bottom:12px}
.riwinner{background:var(--green2);border:1px solid rgba(0,230,118,0.15);border-radius:4px;padding:8px 12px}
.riwl{font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:0.09em;color:var(--green);margin-bottom:3px}
.riwt{color:var(--text2);font-size:12px;font-weight:500}

/* ARTICLE PAGE */
.apgrid{display:grid;grid-template-columns:1fr 300px;gap:24px;padding:24px 0 60px}
.artag{display:inline-flex;align-items:center;gap:8px;font-family:var(--fm);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;cursor:pointer}
.artag:hover{opacity:0.7}
.arbadge{font-family:var(--fm);font-size:9px;padding:2px 7px;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;color:var(--text3)}
.aptitle{font-family:var(--fd);font-size:clamp(28px,4.5vw,52px);letter-spacing:0.02em;line-height:1.05;color:var(--text);margin-bottom:12px}
.apsrcline{display:flex;align-items:center;gap:12px;font-family:var(--fm);font-size:11px;color:var(--text3);margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.apsrc{color:var(--text2);font-weight:500}
.aplabel{font-family:var(--fm);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text4);margin-bottom:8px}
.apsum{font-size:15px;line-height:1.8;color:var(--text2);padding:16px 20px;border-left:2px solid var(--accent);background:var(--bg2);border-radius:0 6px 6px 0;margin-bottom:20px}
.gapbox{border-radius:6px;padding:12px 16px;margin-bottom:16px;font-size:13px;line-height:1.65}
.gapunder{background:var(--accent2);border:1px solid rgba(0,212,255,0.2);color:var(--accent)}
.gapover{background:var(--amber2);border:1px solid rgba(255,170,0,0.2);color:var(--amber)}
.apscores{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sblock{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px}
.sblabel{font-family:var(--fm);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text4);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.conf{font-family:var(--fm);font-size:9px;padding:2px 7px;background:var(--accent2);border:1px solid rgba(0,212,255,0.2);border-radius:10px;color:var(--accent)}
.sbnum{font-family:var(--fd);font-size:42px;letter-spacing:0.02em;line-height:1}
.sbnum.sh{color:var(--amber)}.sbnum.sa{color:var(--accent)}
.sbden{font-size:14px;color:var(--text4);margin-left:2px}
.sbars{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.sbr{display:flex;align-items:center;gap:7px}
.sbl{font-family:var(--fm);font-size:9px;color:var(--text4);width:58px;flex-shrink:0}
.sbt{flex:1;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden}
.sbf{height:100%;border-radius:1px}
.sbv{font-family:var(--fm);font-size:10px;color:var(--text3);width:24px;text-align:right}
.penrow{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.pentag{font-family:var(--fm);font-size:10px;padding:3px 9px;background:var(--red2);color:var(--red);border:1px solid rgba(255,69,105,0.25);border-radius:3px}
.aibox{background:var(--accent2);border:1px solid rgba(0,212,255,0.15);border-radius:8px;padding:16px;margin-bottom:20px}
.ailabel{font-family:var(--fm);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.aitext{font-size:13px;color:var(--text2);line-height:1.7}
.apactions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.btnread{padding:14px;background:var(--accent);color:var(--bg);font-family:var(--fd);font-size:17px;letter-spacing:0.06em;border:none;border-radius:6px;cursor:pointer;transition:all 0.2s}
.btnread:hover{background:#33ddff;transform:translateY(-1px)}
.btnroom{padding:14px;background:transparent;color:var(--accent);font-family:var(--fd);font-size:17px;letter-spacing:0.06em;border:1px solid var(--accent);border-radius:6px;cursor:pointer;transition:all 0.2s}
.btnroom:hover{background:var(--accent2)}
.apsbtitle{font-family:var(--fm);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text4);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.comp{padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:10px;align-items:start;transition:opacity 0.2s}
.comp:last-child{border-bottom:none}
.comp:hover .ctitle{color:var(--accent)}
.crank{font-family:var(--fd);font-size:22px;letter-spacing:0.02em;color:var(--text4);min-width:24px;line-height:1.2}
.crank.cur{color:var(--accent)}
.ctitle{font-size:12px;font-weight:500;color:var(--text);line-height:1.35;margin-bottom:3px;transition:color 0.2s}
.csrc{font-family:var(--fm);font-size:10px;color:var(--text3)}
.cchips{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}

/* ENGAGEMENT */
.eng-bar{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:16px}
.eng-label{font-family:var(--fm);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text4);margin-bottom:12px}
.eng-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.eng-btn{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 14px;cursor:pointer;font-family:var(--fb);font-size:13px;color:var(--text2);transition:all 0.2s;user-select:none}
.eng-btn:hover{border-color:var(--border2);color:var(--text)}
.eng-btn.active-like{border-color:var(--green);color:var(--green);background:var(--green2)}
.eng-btn.active-agree{border-color:var(--accent);color:var(--accent);background:var(--accent2)}
.eng-btn.active-flag{border-color:var(--red);color:var(--red);background:var(--red2)}
.eng-icon{font-size:15px;line-height:1;flex-shrink:0}
.eng-count{font-family:var(--fm);font-size:11px;letter-spacing:0.04em}
.eng-share{display:flex;align-items:center;gap:7px;background:transparent;border:1px solid var(--border);border-radius:6px;padding:9px 14px;cursor:pointer;font-family:var(--fb);font-size:13px;color:var(--text3);transition:all 0.2s;margin-left:auto}
.eng-share:hover{border-color:var(--accent);color:var(--accent)}
.eng-comment-area{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:none}
.eng-comment-area.open{display:block}
.eng-comments-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.eng-comment{background:var(--bg3);border-radius:6px;padding:10px 12px}
.eng-comment-meta{font-family:var(--fm);font-size:9px;color:var(--text4);margin-bottom:4px}
.eng-comment-text{font-size:13px;color:var(--text2);line-height:1.6}
.eng-input-row{display:flex;gap:8px}
.eng-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-family:var(--fb);font-size:13px;color:var(--text);outline:none;transition:border-color 0.2s}
.eng-input:focus{border-color:var(--accent)}
.eng-input::placeholder{color:var(--text4)}
.eng-post-btn{background:var(--accent);color:var(--bg);font-family:var(--fd);font-size:15px;letter-spacing:0.06em;border:none;border-radius:6px;padding:9px 18px;cursor:pointer}



/* COMMUNITY STRIP */
.community-strip{margin:24px 0 8px}
.community-strip-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.community-strip-title{font-family:var(--fd);font-size:22px;letter-spacing:0.04em;color:var(--text)}
.community-strip-meta{font-family:var(--fm);font-size:10px;color:var(--text4);letter-spacing:0.06em}
.community-strip-meta span{color:var(--green)}

.cs-scroll{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

.cs-card{border-radius:10px;padding:18px 20px;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;cursor:default}
.cs-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.cs-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.25)}

/* Card types */
.cs-card.type-comment{background:rgba(185,128,255,0.07);border:1px solid rgba(185,128,255,0.18)}
.cs-card.type-comment::before{background:var(--purple)}
.cs-card.type-gem{background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.18)}
.cs-card.type-gem::before{background:var(--accent)}
.cs-card.type-submit{background:rgba(0,230,118,0.07);border:1px solid rgba(0,230,118,0.18)}
.cs-card.type-submit::before{background:var(--green)}
.cs-card.type-contested{background:rgba(255,170,0,0.07);border:1px solid rgba(255,170,0,0.18)}
.cs-card.type-contested::before{background:var(--amber)}

.cs-card-eyebrow{display:flex;align-items:center;gap:7px;font-family:var(--fm);font-size:9px;letter-spacing:0.13em;text-transform:uppercase}
.cs-card-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cs-card-quote{font-size:14px;line-height:1.6;color:var(--text);font-style:italic;flex:1}
.cs-card-quote strong{font-style:normal;font-weight:600;color:var(--text)}
.cs-card-stat{font-family:var(--fd);font-size:36px;letter-spacing:0.02em;line-height:1;flex:1}
.cs-card-stat-sub{font-family:var(--fm);font-size:10px;color:var(--text3);letter-spacing:0.04em;line-height:1.5}
.cs-card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06)}
.cs-card-author{font-family:var(--fm);font-size:10px;letter-spacing:0.06em}
.cs-card-link{font-family:var(--fm);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.5;cursor:pointer;transition:opacity 0.15s;-webkit-tap-highlight-color:transparent}
.cs-card-link:hover{opacity:1}
.cs-card-article{font-size:12px;color:var(--text2);line-height:1.4;flex:1}
.cs-card-article strong{color:var(--text);font-weight:600;display:block;margin-bottom:3px}
.cs-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--fm);font-size:9px;padding:2px 8px;border-radius:3px;letter-spacing:0.06em}

@media(max-width:900px){.cs-scroll{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.cs-scroll{grid-template-columns:1fr};.cs-card{padding:14px 16px}}
/* SUBMIT ARTICLE */
.submit-bar{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(0,212,255,0.05),rgba(185,128,255,0.05));border:1px dashed rgba(0,212,255,0.25);border-radius:10px;padding:18px 22px;margin:24px 0;gap:16px;flex-wrap:wrap}
.submit-bar-text{display:flex;align-items:center;gap:12px}
.submit-bar-icon{font-size:22px;flex-shrink:0}
.submit-bar-label{font-family:var(--fd);font-size:20px;letter-spacing:0.03em;color:var(--text)}
.submit-bar-sub{font-family:var(--fm);font-size:10px;color:var(--text3);letter-spacing:0.06em;margin-top:2px}
.submit-bar-btn{background:var(--accent);color:var(--bg);font-family:var(--fd);font-size:16px;letter-spacing:0.08em;border:none;border-radius:6px;padding:11px 24px;cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
.submit-bar-btn:hover{background:#33ddff;transform:translateY(-1px)}

.submit-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.submit-modal-overlay.open{display:flex}
.submit-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative}
.submit-modal-header{padding:24px 24px 0;border-bottom:1px solid var(--border);padding-bottom:16px;display:flex;align-items:flex-start;justify-content:space-between}
.submit-modal-title{font-family:var(--fd);font-size:28px;letter-spacing:0.03em;color:var(--text)}
.submit-modal-sub{font-family:var(--fm);font-size:10px;color:var(--text3);letter-spacing:0.06em;margin-top:4px}
.submit-modal-close{background:transparent;border:1px solid var(--border);color:var(--text3);font-size:18px;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.submit-modal-close:hover{border-color:var(--red);color:var(--red)}
.submit-modal-body{padding:20px 24px 24px;display:flex;flex-direction:column;gap:16px}
.submit-field{display:flex;flex-direction:column;gap:6px}
.submit-label{font-family:var(--fm);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3)}
.submit-label span{color:var(--red);margin-left:2px}
.submit-input{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:11px 14px;font-family:var(--fb);font-size:14px;color:var(--text);outline:none;transition:border-color 0.2s;width:100%}
.submit-input:focus{border-color:var(--accent)}
.submit-input::placeholder{color:var(--text4)}
.submit-textarea{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:11px 14px;font-family:var(--fb);font-size:13px;color:var(--text);outline:none;transition:border-color 0.2s;width:100%;resize:vertical;min-height:80px;line-height:1.6}
.submit-textarea:focus{border-color:var(--accent)}
.submit-textarea::placeholder{color:var(--text4)}
.submit-narr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.submit-narr-btn{padding:8px 6px;border-radius:5px;border:1px solid var(--border);background:transparent;cursor:pointer;font-family:var(--fm);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);transition:all 0.15s;text-align:center}
.submit-narr-btn:hover{border-color:var(--border2);color:var(--text)}
.submit-narr-btn.sel{color:var(--bg);font-weight:600}
.submit-hint{font-family:var(--fm);font-size:10px;color:var(--text4);line-height:1.6;padding:10px 14px;background:var(--bg3);border-radius:6px;border-left:2px solid var(--accent)}
.submit-actions{display:flex;gap:10px;padding-top:4px}
.submit-btn-main{flex:1;background:var(--accent);color:var(--bg);font-family:var(--fd);font-size:18px;letter-spacing:0.06em;border:none;border-radius:6px;padding:13px;cursor:pointer;transition:all 0.2s}
.submit-btn-main:hover{background:#33ddff}
.submit-btn-main:disabled{opacity:0.4;cursor:not-allowed}
.submit-btn-cancel{background:transparent;border:1px solid var(--border);color:var(--text3);font-family:var(--fm);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;border-radius:6px;padding:13px 20px;cursor:pointer;transition:all 0.2s}
.submit-btn-cancel:hover{border-color:var(--border2);color:var(--text)}
.submit-success{text-align:center;padding:32px 24px;display:none;flex-direction:column;align-items:center;gap:14px}
.submit-success.show{display:flex}
.submit-success-icon{font-size:48px}
.submit-success-title{font-family:var(--fd);font-size:28px;letter-spacing:0.03em;color:var(--green)}
.submit-success-msg{font-size:14px;color:var(--text2);line-height:1.7;max-width:360px}
.submit-success-close{margin-top:8px;background:var(--green);color:var(--bg);font-family:var(--fd);font-size:17px;letter-spacing:0.06em;border:none;border-radius:6px;padding:11px 28px;cursor:pointer}

@media(max-width:600px){
  .submit-narr-grid{grid-template-columns:repeat(2,1fr)}
  .submit-modal-header{padding:16px 16px 14px}
  .submit-modal-body{padding:16px}
  .submit-modal-title{font-size:22px}
}
/* ROOM PAGE */
.roomhdr{padding:28px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
.rhey{font-family:var(--fm);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.rhtitle{font-family:var(--fd);font-size:clamp(36px,6vw,72px);letter-spacing:0.03em;line-height:1;margin-bottom:10px}
.rhmeta{display:flex;align-items:center;gap:18px;font-family:var(--fm);font-size:11px;color:var(--text3);flex-wrap:wrap}
.wlstrip{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.wlcard{padding:16px 18px;border-radius:8px;border:1px solid}
.wlw{background:var(--green2);border-color:rgba(0,230,118,0.2)}
.wll{background:var(--red2);border-color:rgba(255,69,105,0.2)}
.wllabel{font-family:var(--fm);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;font-weight:500;margin-bottom:5px}
.wlwin{color:var(--green)}.wllose{color:var(--red)}
.wltitle{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;cursor:pointer;transition:color 0.2s;line-height:1.3}
.wltitle:hover{color:var(--accent)}
.wlsrc{font-family:var(--fm);font-size:10px;color:var(--text3)}
.gapcall{background:var(--amber2);border:1px solid rgba(255,170,0,0.2);border-radius:8px;padding:14px 18px;margin-bottom:20px;font-size:13px;color:var(--text2);line-height:1.65}
.gclabel{font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--amber);margin-bottom:5px}
.rctrl{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.rsort{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.rsb{padding:7px 14px;font-family:var(--fm);font-size:10px;letter-spacing:0.07em;background:transparent;color:var(--text3);border:none;border-right:1px solid var(--border);cursor:pointer;transition:all 0.15s;text-transform:uppercase}
.rsb:last-child{border-right:none}
.rsb:hover{color:var(--text);background:var(--bg3)}
.rsb.on{background:var(--accent);color:var(--bg)}
.rlegend{display:flex;gap:14px;font-family:var(--fm);font-size:10px;color:var(--text3)}
.rli{display:flex;align-items:center;gap:5px}
.rld{width:6px;height:6px;border-radius:50%}

/* PERSPECTIVE CLUSTERS */
.pcluster-wrap{display:flex;flex-direction:column;gap:16px;margin-bottom:32px}
.pcluster{border-radius:10px;overflow:hidden;border:1px solid}
.pcluster-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px}
.pcluster-name{font-family:var(--fd);font-size:26px;letter-spacing:0.04em}
.pcluster-count{font-family:var(--fm);font-size:10px;letter-spacing:0.08em;text-transform:uppercase}
.pcluster-desc{font-size:13px;color:var(--text2);padding:0 20px 14px;line-height:1.55;opacity:0.85}
.pcluster-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:0 2px 2px}
.pcluster-grid.cols2{grid-template-columns:repeat(2,1fr)}
.pcluster-grid.cols1{grid-template-columns:1fr}
.pcard{background:var(--bg);border-radius:6px;padding:16px;cursor:pointer;transition:opacity 0.15s,transform 0.15s}
.pcard:hover{opacity:0.85;transform:translateY(-1px)}
.pcard:hover .pcard-title{color:var(--accent)}
.pcard-rank{font-family:var(--fd);font-size:30px;letter-spacing:0.02em;line-height:1;margin-bottom:6px;opacity:0.2}
.pcard-title{font-size:13px;font-weight:500;line-height:1.35;color:var(--text);margin-bottom:5px;transition:color 0.15s}
.pcard-src{font-family:var(--fm);font-size:10px;margin-bottom:10px;opacity:0.7}
.pcard-bars{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.pcard-bar-row{display:flex;align-items:center;gap:6px}
.pcard-bar-label{font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:0.06em;width:20px;flex-shrink:0}
.pcard-bar-track{flex:1;height:2px;border-radius:1px;overflow:hidden;background:rgba(255,255,255,0.08)}
.pcard-bar-fill{height:100%;border-radius:1px}
.pcard-bar-val{font-family:var(--fm);font-size:10px;width:24px;text-align:right}
.pcard-chips{display:flex;gap:3px;flex-wrap:wrap}

/* FLAT GRID (non-cluster view) */
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-bottom:32px}
.rcard{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:18px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.rcard:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-1px)}
.rcard:hover .rctitle{color:var(--accent)}
.rcard.rcw{border-top:2px solid var(--green)}
.rcard.rcl{border-top:2px solid var(--red);opacity:0.75}
.rcard.rcl:hover{opacity:1}
.rcnum{position:absolute;top:14px;right:14px;font-family:var(--fd);font-size:32px;color:rgba(255,255,255,0.04);line-height:1;user-select:none}
.rcstatus{font-family:var(--fm);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px}
.rctitle{font-size:14px;font-weight:500;line-height:1.35;color:var(--text);margin-bottom:5px;transition:color 0.2s;padding-right:32px}
.rcsrc{font-family:var(--fm);font-size:10px;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.rcbars{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.rbrw{display:flex;align-items:center;gap:6px}
.rbrl{font-family:var(--fm);font-size:9px;color:var(--text4);width:26px;text-transform:uppercase}
.rbrt{flex:1;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden}
.rbrf{height:100%;border-radius:1px}
.rbrv{font-family:var(--fm);font-size:10px;color:var(--text3);width:32px;text-align:right}
.rcchips{display:flex;flex-wrap:wrap;gap:3px}

/* SUMMARY PANEL */
.sum-panel{border:1px solid var(--border);border-radius:8px;margin:20px 0;overflow:hidden;background:var(--bg2)}
.sum-panel.fp{border-left:2px solid var(--accent)}
.sum-panel.room{border-left:2px solid var(--purple)}
.sum-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;transition:background 0.2s}
.sum-hdr:hover{background:var(--bg3)}
.sum-hl{display:flex;align-items:center;gap:12px}
.sum-icon{font-family:var(--fm);font-size:11px;padding:4px 8px;border-radius:4px;flex-shrink:0;letter-spacing:0.06em}
.sum-icon.fp{background:var(--accent2);color:var(--accent);border:1px solid rgba(0,212,255,0.2)}
.sum-icon.room{background:var(--purple2);color:var(--purple);border:1px solid rgba(185,128,255,0.2)}
.sum-htitle{font-size:13px;font-weight:500;color:var(--text)}
.sum-hsub{font-family:var(--fm);font-size:10px;color:var(--text4);margin-top:2px}
.sum-tog{font-family:var(--fm);font-size:10px;color:var(--text4);transition:transform 0.25s;flex-shrink:0}
.sum-tog.open{transform:rotate(180deg)}
.sum-body{padding:0;max-height:0;overflow:hidden;transition:max-height 0.4s ease}
.sum-body.open{max-height:1400px;padding:0 18px 18px}
.sum-loading{display:flex;align-items:center;gap:10px;color:var(--text3);font-family:var(--fm);font-size:11px;padding:16px 0}
.spin{width:14px;height:14px;border:1.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.sum-secs{display:flex;flex-direction:column;gap:14px;padding-top:4px}
.sum-sec-title{font-family:var(--fm);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:6px}
.sum-sec-body{font-size:13px;color:var(--text2);line-height:1.75}
.sum-sec-body ul{padding-left:16px;margin-top:5px}
.sum-sec-body li{margin-bottom:5px}
.sum-div{height:1px;background:var(--border)}
.sum-regen{font-family:var(--fm);font-size:10px;color:var(--text4);cursor:pointer;margin-top:12px;display:inline-flex;align-items:center;gap:5px}
.sum-regen:hover{color:var(--accent)}
.show-more-btn{background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:var(--fm);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;padding:12px 32px;border-radius:4px;cursor:pointer;transition:all 0.2s}
.show-more-btn:hover{border-color:var(--accent);color:var(--accent)}
.sum-err{font-family:var(--fm);font-size:12px;color:var(--red);padding:8px 0}
.top-ticker{background:rgba(0,0,0,0.6);border-bottom:1px solid var(--border);overflow:hidden;height:32px;display:flex;align-items:center;width:100%}
.top-ticker .tinner{display:inline-block;white-space:nowrap;animation:tick 80s linear infinite;font-size:11px;will-change:transform}
.top-ticker .tinner:hover{animation-play-state:paused}
.top-ticker .ti{display:inline-block;padding:0 40px;color:var(--text3);letter-spacing:0.04em;border-right:1px solid var(--border)}
.top-ticker .ti strong{margin-right:8px}
.ticker{overflow:hidden;white-space:nowrap;padding:8px 0;border-bottom:1px solid var(--border);background:var(--bg2)}
.tinner{display:inline-block;animation:tick 40s linear infinite}
.tinner:hover{animation-play-state:paused}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{display:inline-block;padding:0 28px;font-family:var(--fm);font-size:11px;color:var(--text3)}
.ti strong{color:var(--accent)}
.ti::after{content:'//';margin-left:28px;color:var(--text4)}


/* NEWSPAPER GRID */
.np-grid{display:grid;gap:3px;margin:20px 0}
.np-row{display:grid;gap:3px}
.np-row.r1{grid-template-columns:2fr 1fr}
.np-row.r2{grid-template-columns:1fr 1fr 1fr}
.np-row.r3{grid-template-columns:1fr 2fr}
.np-row.r4{grid-template-columns:1fr 1fr}

.ncard{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;background:#f0f2f5;border:1px solid rgba(0,0,0,0.07);transition:transform 0.2s,box-shadow 0.2s;-webkit-tap-highlight-color:transparent;box-shadow:0 2px 8px rgba(0,0,0,0.14)}
.ncard:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,0.22)}
.ncard:hover .ncard-title{color:#1a6bcc}

.ncard.large{min-height:360px;display:flex;flex-direction:column}
.ncard.medium{min-height:260px;display:flex;flex-direction:column}
.ncard.small{min-height:140px;display:flex;flex-direction:column}

.ncard-img{width:100%;object-fit:cover;flex-shrink:0;display:block}
.ncard.large .ncard-img{height:180px}
.ncard.medium .ncard-img{height:120px}
.ncard.small .ncard-img{height:70px}

.ncard-body{padding:18px;flex:1;display:flex;flex-direction:column;gap:8px;background:#f0f2f5}
.ncard.small .ncard-body{padding:10px 14px}

.ncard-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ncard-room{font-family:var(--fm);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#6b7280;font-weight:500}
.ncard-title{font-family:var(--fd);letter-spacing:0.02em;line-height:1.08;color:#0d1117;transition:color 0.2s;flex:1}
.ncard.large .ncard-title{font-size:clamp(24px,2.8vw,34px)}
.ncard.medium .ncard-title{font-size:clamp(20px,2.2vw,26px)}
.ncard.small .ncard-title{font-size:18px;font-family:var(--fd)}

.ncard-src{font-family:var(--fm);font-size:11px;color:#6b7280;letter-spacing:0.04em}
.ncard-scores{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:8px;border-top:1px solid rgba(0,0,0,0.08)}
.ncard-score{font-family:var(--fm);font-size:10px;letter-spacing:0.04em;font-weight:500}
.ncard-bar{flex:1;height:2px;background:rgba(0,0,0,0.12);border-radius:1px;overflow:hidden;max-width:60px}
.ncard-bar-fill{height:100%;border-radius:1px}
.ncard-img-wrap{position:relative;overflow:hidden;flex-shrink:0}
.ncard.large .ncard-img-wrap{height:160px}
.ncard.medium .ncard-img-wrap{height:110px}
.ncard-img{width:100%;height:100%;object-fit:cover;display:block;filter:grayscale(20%) contrast(1.05)}
.ncard-img-hue{position:absolute;inset:0;mix-blend-mode:multiply;pointer-events:none}
.ncard-img-fade{position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,#f0f2f5);pointer-events:none}
.ncard-gap{font-size:9px;font-family:var(--fm);padding:2px 6px;border-radius:2px;letter-spacing:0.04em}

.np-sidebar{display:flex;flex-direction:column;gap:3px}
.sbcard{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all 0.2s}
.sbcard:hover{border-color:var(--border2);background:var(--bg3)}
.sbcard:hover .sbcard-title{color:var(--accent)}
.sbcard-label{font-family:var(--fm);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text4);margin-bottom:4px}
.sbcard-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.3;margin-bottom:8px;transition:color 0.15s}
.sbcard-meta{font-family:var(--fm);font-size:10px;color:var(--text3);margin-bottom:8px}
.sbcard-art{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer}
.sbcard-art:last-child{border-bottom:none}
.sbcard-art:hover .sbcard-art-title{color:var(--accent)}
.sbcard-art-rank{font-family:var(--fd);font-size:20px;color:var(--text4);width:20px;flex-shrink:0;line-height:1}
.sbcard-art-title{font-size:12px;color:var(--text2);line-height:1.3;transition:color 0.15s}

function engToggle(id,type){

function submitArticle(){
  var url=document.getElementById('su-url').value.trim();

    pen:[],

      +'<div class="cs-card-footer"><span class="cs-badge" style="background:rgba(0,212,255,0.1);color:'+gapColor+'">'+gapLabel+'</span><span class="cs-card-link" style="color:'+gapColor+'">Investigate &#8599;</span></div>'

function buildRealitySplit(rid){
  var splits=REALITY_SPLIT[rid];
  if(!splits||!splits.length) return '';
  var arts=RARTS[rid];
  var cols=splits.length===2?'cols2':'';
  var blocks=splits.map(function(sp){
    // Get sources for this cluster
    var clArts=arts.filter(function(a){return sp.narrs.indexOf(a.narr||'factual')!==-1;});
    var srcList=clArts.slice(0,3).map(function(a){return a.src;}).join(', ');
    return '<div class="rs-block" style="background:'+sp.bg+';border:1px solid '+sp.border+'">'
      +'<div class="rs-cluster-label" style="color:'+sp.color+'"><span class="rs-cluster-dot" style="background:'+sp.color+'"></span>'+sp.cluster+'</div>'
      +'<div class="rs-intro">'+sp.intro+'</div>'
      +'<div class="rs-statement">'+sp.statement+'</div>'
      +(srcList?'<div class="rs-sources">Sources: '+srcList+'</div>':'')
    +'</div>';
  }).join('');
  return '<div class="rs-section">'
    +'<div class="rs-label">Reality Split</div>'
    +'<div class="rs-grid '+cols+'">'+blocks+'</div>'
    +'</div>';
}

var roomArticleCache={};

function loadRoomArticle(rid){
  var el=document.getElementById('room-article-'+rid);
  if(!el) return;
  if(roomArticleCache[rid]){
    el.innerHTML=renderRoomArticle(roomArticleCache[rid]);
    return;
  }
  var today=new Date().toISOString().slice(0,10);
  sbFetch('room_articles','room_id=eq.'+rid+'&date=eq.'+today+'&select=content,generated_at,article_count')
    .then(function(data){
      if(Array.isArray(data)&&data.length>0){
        roomArticleCache[rid]=data[0];
        var el2=document.getElementById('room-article-'+rid);
        if(el2) el2.innerHTML=renderRoomArticle(data[0]);
      } else {
        // Try most recent
        sbFetch('room_articles','room_id=eq.'+rid+'&order=date.desc&limit=1&select=content,generated_at,article_count')
          .then(function(d2){
            var el3=document.getElementById('room-article-'+rid);
            if(!el3) return;
            if(Array.isArray(d2)&&d2.length>0){
              roomArticleCache[rid]=d2[0];
              el3.innerHTML=renderRoomArticle(d2[0]);
            } else {
              el3.innerHTML='<div style="font-family:var(--fm);font-size:11px;color:var(--text4);padding:12px 0;letter-spacing:0.06em">Room article will be generated on the next pipeline run.</div>';
            }
          });
      }
    })
    .catch(function(){
      var el2=document.getElementById('room-article-'+rid);
      if(el2) el2.innerHTML='';
    });
}

function renderRoomArticle(data){
  var date=data.generated_at?new Date(data.generated_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'Today';
  var paras=data.content.split('\n\n').filter(function(p){return p.trim().length>0;});
  var body=paras.map(function(p){return '<p style="margin-bottom:14px;font-size:14px;line-height:1.85;color:var(--text2)">'+p.trim()+'</p>';}).join('');
  return '<div style="padding:4px 0">'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'
    +'<span style="font-family:var(--fm);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--purple);padding:3px 10px;border:1px solid rgba(185,128,255,0.3);border-radius:3px;background:rgba(185,128,255,0.06)">Room Article</span>'
    +'<span style="font-family:var(--fm);font-size:9px;color:var(--text4);letter-spacing:0.06em">Generated '+date+'</span>'
    +(data.article_count?'<span style="font-family:var(--fm);font-size:9px;color:var(--text4)">Based on '+data.article_count+' perspectives</span>':'')
    +'</div>'
    +body
    +'</div>';
}

function nav(view,id){
  if(curView) navHistory.push({view:curView,id:curId});
  curView=view;curId=id;
  doRender(view,id);
  document.getElementById('backbtn').className=navHistory.length?'show':'';
  window.scrollTo(0,0);
}

  if(!navHistory.length) return;

function buildFpRealitySplit(){
  // Pick the room with the most articles that has a reality split defined
  var best=null, bestCount=0;
  Object.keys(RARTS).forEach(function(rid){
    var arts=RARTS[rid]||[];
    if(arts.length>bestCount && REALITY_SPLIT[rid]){
      bestCount=arts.length; best=rid;
    }
  });
  if(!best||bestCount<2) return '';

  var room=ROOMS[best];
  var splits=REALITY_SPLIT[best];
  var arts=RARTS[best];
  if(!splits||!splits.length) return '';

  var cols=splits.length===2?'cols2':'';
  var blocks=splits.map(function(sp){
    var clArts=arts.filter(function(a){return sp.narrs.indexOf(a.narr||'factual')!==-1;});
    var srcList=clArts.slice(0,2).map(function(a){return a.src;}).join(', ');
    return '<div class="rs-block" style="background:'+sp.bg+';border:1px solid '+sp.border+';cursor:pointer" data-room="'+best+'" onclick="nav(\u0027room\u0027,this.dataset.room)">'
      +'<div class="rs-cluster-label" style="color:'+sp.color+'"><span class="rs-cluster-dot" style="background:'+sp.color+'"></span>'+sp.cluster+'</div>'
      +'<div class="rs-intro">'+sp.intro+'</div>'
      +'<div class="rs-statement">'+sp.statement+'</div>'
      +(srcList?'<div class="rs-sources">'+srcList+'</div>':'')
      +'</div>';
  }).join('');

  return '<div style="margin:20px 0">'
    +'<div class="slabel" style="margin-bottom:12px">Reality Split &mdash; <span style="color:var(--accent);cursor:pointer" data-room="'+best+'" onclick="nav(\u0027room\u0027,this.dataset.room)">'+room.title+' &#8599;</span> <span style="color:var(--text4);font-size:9px;margin-left:8px">click any block to enter the room</span></div>'
    +'<div class="rs-grid '+cols+'">'+blocks+'</div>'
    +'</div>';
}

function buildEventOfMoment(){
  // Pick the most active room that has a reality split
  var best=null, bestCount=0;
  Object.keys(RARTS).forEach(function(rid){
    var arts=RARTS[rid]||[];
    if(arts.length>bestCount&&REALITY_SPLIT[rid]) {bestCount=arts.length;best=rid;}
  });
  if(!best||bestCount<2) return '';

  var room=ROOMS[best];
  var splits=REALITY_SPLIT[best];
  var arts=RARTS[best];
  var winner=arts[0];
  if(!winner) return '';

  // Image
  var imgSrc=winner.aiImg||getArticleImage(winner,1200,440);
  var hue=getNarrHue(winner.narr||'factual');
  var imgHtml=imgSrc?'<div class="eom-image">'
    +'<img src="'+imgSrc+'" loading="lazy" onerror="this.parentNode.style.display=\u0027none\u0027" />'
    +'<div class="eom-image-hue" style="background:'+hue+'"></div>'
    +'<div class="eom-image-fade"></div>'
    +'</div>':'';

  // Reality Split blocks
  var splitBlocks=(splits||[]).map(function(sp){
    return '<div class="eom-split" style="background:'+sp.bg+';border:1px solid '+sp.border+'">'
      +'<div class="eom-split-cluster" style="color:'+sp.color+'">'+sp.cluster+'</div>'
      +'<div class="eom-split-statement">'+sp.statement+'</div>'
      +'</div>';
  }).join('');

  // Key articles — top 4, different narratives
  var seen={};
  var keyArts=[];
  arts.forEach(function(a){
    if(keyArts.length<4&&!seen[a.narr||'factual']){
      seen[a.narr||'factual']=true;
      keyArts.push(a);
    }
  });
  // Fill up to 4 if needed
  arts.forEach(function(a){if(keyArts.length<4&&keyArts.indexOf(a)===-1)keyArts.push(a);});
  keyArts=keyArts.slice(0,4);

  var articleBlocks=keyArts.map(function(a){
    var nc=NARR_COLORS[a.narr||'factual']||'#9da3b4';
    return '<div class="eom-article" data-art="'+a.id+'" onclick="event.stopPropagation();nav(\u0027article\u0027,this.dataset.art)">'
      +'<div class="eom-article-narr" style="color:'+nc+'">'+( a.narr||'factual')+'</div>'
      +'<div class="eom-article-title">'+a.title+'</div>'
      +'<div class="eom-article-src">'+a.src+'</div>'
      +'</div>';
  }).join('');

  // Context — use room synthesis summary if available, otherwise fallback
  var context=room.context||'The most active story on ARGUS right now. Multiple sources, multiple realities — all in one room.';
  var macroFrame=MACRO_FRAMES&&MACRO_FRAMES[best]?(MACRO_FRAMES[best].statement||MACRO_FRAMES[best]):null;

  return '<div class="eom-block" data-room="'+best+'" onclick="nav(\u0027room\u0027,this.dataset.room)">'
    // Eyebrow
    +'<div class="eom-eyebrow">'
    +'<div class="eom-eyebrow-dot"></div>'
    +'<div class="eom-eyebrow-label">Event of the moment</div>'
    +'<div class="eom-eyebrow-room">'+room.title+' &nbsp;&#8599;</div>'
    +'</div>'
    // Image
    +imgHtml
    // Body
    +'<div class="eom-body">'
    +'<div class="eom-title">'+room.title+'</div>'
    +'<div class="eom-context">'+context+'</div>'
    +(macroFrame?'<div style="margin:0 0 20px;padding:12px 18px;background:rgba(185,128,255,0.07);border:1px solid rgba(185,128,255,0.2);border-radius:6px;border-left:2px solid var(--purple)">'
      +'<div style="font-family:var(--fm);font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:var(--purple);margin-bottom:6px">&#9632; ARGUS Macro</div>'
      +'<div style="font-size:13px;color:var(--text2);line-height:1.65;font-style:italic">&ldquo;'+macroFrame+'&rdquo;</div>'
      +'</div>':'')
    +'</div>'
    // Reality Split
    +'<div style="padding:0 0 3px"><div style="font-family:var(--fm);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text4);padding:8px 24px 8px">Reality Split &mdash; if you only read one source, you believe:</div>'
    +'<div class="eom-splits" style="margin:0 0 3px">'+splitBlocks+'</div>'
    +'</div>'
    // Key articles
    +(articleBlocks?'<div class="eom-articles">'+articleBlocks+'</div>':'')
    // CTA
    +'<div class="eom-cta">Enter the room to see all '+arts.length+' perspectives &nbsp;<span>&#8599;</span></div>'
    +'</div>';
}

function buildFront(){
  var allSorted=ARTS.filter(function(a){return a&&a.id&&a.room&&ROOMS[a.room];}).sort(function(a,b){return (hs(b)+b.ai)-(hs(a)+a.ai);});

  if(allSorted.length===0){
    return '<div class="wrap"><div class="masthead"><div class="mh1">ARGUS</div><div class="mtag">Run the pipeline to add articles.</div></div></div>';
  }

  // Rich ticker — headlines + reality split statements + macro frames
  var tickerItems=[];

  // Add top article headlines
  allSorted.slice(0,8).forEach(function(a){
    var room=ROOMS[a.room];
    tickerItems.push('<span class="ti"><strong style="color:var(--accent)">'+(room?room.title.toUpperCase():'NEWS')+'</strong> '+a.title+'</span>');
  });

  // Add reality split statements
  Object.keys(REALITY_SPLIT).forEach(function(rid){
    var splits=REALITY_SPLIT[rid]||[];
    var room=ROOMS[rid];
    if(!room||!splits.length) return;
    splits.slice(0,1).forEach(function(sp){
      tickerItems.push('<span class="ti"><strong style="color:'+sp.color+'">'+sp.cluster.toUpperCase()+'</strong> '+sp.statement+'</span>');
    });
  });

  // Add macro frames
  Object.keys(MACRO_FRAMES).forEach(function(rid){
    var mf=MACRO_FRAMES[rid];
    var room=ROOMS[rid];
    if(!room||!mf) return;
    var mfText=mf.statement||mf;
    tickerItems.push('<span class="ti"><strong style="color:var(--purple)">ARGUS MACRO</strong> '+mfText+'</span>');
  });

  // Shuffle for variety — interleave types
  var th=tickerItems.join('');
  if(!th) th='<span class="ti"><strong>ARGUS</strong> Loading perspectives...</span>';
  th=th+th;

  // Right now
  var liveRooms=Object.keys(ROOMS).filter(function(r){return ROOMS[r].is_live||r==='iran-war-2026';});
  var rnArts=[];
  liveRooms.forEach(function(rid){var arts=RARTS[rid]||[];if(arts[0])rnArts.push({art:arts[0],rid:rid,live:true});});
  Object.keys(RARTS).forEach(function(rid){
    if(liveRooms.indexOf(rid)===-1){var arts=RARTS[rid]||[];if(arts[0]&&rnArts.length<6)rnArts.push({art:arts[0],rid:rid,live:false});}
  });
  rnArts=rnArts.slice(0,5);
  var LIVE_COLORS=['var(--red)','var(--red)','var(--amber)','var(--accent)','var(--text3)'];
  function timeAgo(ts){
    if(!ts) return 'Latest';
    var diff=Math.floor((Date.now()-new Date(ts).getTime())/60000);
    if(diff<5) return 'Just now';
    if(diff<60) return diff+'m ago';
    if(diff<1440) return Math.floor(diff/60)+'h ago';
    return Math.floor(diff/1440)+'d ago';
  }
  var rnHtml=rnArts.map(function(item,i){
    var a=item.art;
    var room=ROOMS[item.rid];
    var c=item.live?'var(--red)':LIVE_COLORS[i]||'var(--text3)';
    var t=item.live?'<span style="color:var(--red)">&#9679; Live</span>':timeAgo(item.art.createdAt);
    return '<div class="rn-item'+(item.live?' live':'')+' rn-clickable" data-rid="'+item.rid+'" onclick="nav(\u0027room\u0027,this.dataset.rid)" style="cursor:pointer"><div class="rn-bullet" style="background:'+c+(item.live?';box-shadow:0 0 6px '+c:'')+'"></div><div class="rn-text">'+a.title+'</div><div class="rn-room" style="color:'+c+'">'+room.title+' &#8599;</div><div class="rn-time" style="color:'+(item.live?'var(--red)':'var(--text4)')+'">'+t+'</div></div>';
  }).join('');

  // Sidebar rooms
  var sbHtml=Object.values(ROOMS).map(function(r){
    var arts=(RARTS[r.id]||[]).slice(0,3);
    if(!arts.length) return '';
    var isLive=r.id==='iran-war-2026';
    var artRows=arts.map(function(a,i){
      return '<div class="sbcard-art" data-art="'+a.id+'" onclick="event.stopPropagation();nav(\u0027article\u0027,this.dataset.art)"><div class="sbcard-art-rank">'+(i+1)+'</div><div><div class="sbcard-art-title">'+a.title+'</div><div class="sbcard-art-src">'+a.src+'</div></div></div>';
    }).join('');
    return '<div class="sbcard" data-room="'+r.id+'" onclick="nav(\u0027room\u0027,this.dataset.room)"><div class="sbcard-label" style="'+(isLive?'color:var(--red)':'')+'">'+r.label+(isLive?' &#9679;':'')+'</div><div class="sbcard-title">'+r.full+'</div><div class="sbcard-meta">'+RARTS[r.id].length+' perspectives</div>'+artRows+'</div>';
  }).join('');

  // Newspaper grid
  var g=[];
  var usedRooms={};
  allSorted.forEach(function(a){if(a&&a.room&&!usedRooms[a.room]&&g.length<5){usedRooms[a.room]=true;g.push(a);}});
  allSorted.forEach(function(a){if(a&&g.indexOf(a)===-1&&g.length<18)g.push(a);});
  var safeLen=allSorted.length;
  while(g.length<12&&safeLen>0)g.push(allSorted[g.length%safeLen]);

  if(g[0]) g[0].isWinner=true;

  function safeCard(art,size,idx){return art?ncard(art,size,idx):'';}

  var gridHtml=
    '<div class="np-row r1">'+safeCard(g[0],'large',0)+safeCard(g[1],'medium',1)+'</div>'+
    '<div class="np-row r2">'+safeCard(g[2],'medium',2)+safeCard(g[3],'medium',3)+safeCard(g[4],'medium',4)+'</div>'+
    '<div class="np-row" style="display:grid;grid-template-columns:1fr 2fr;gap:3px">'+safeCard(g[5],'medium',5)+safeCard(g[6],'large',6)+'</div>'+
    '<div class="np-row r2">'+safeCard(g[7],'small',7)+safeCard(g[8],'small',8)+safeCard(g[9],'small',9)+'</div>'+
    (g[10]?'<div class="np-row r1">'+safeCard(g[10],'medium',10)+safeCard(g[11],'medium',11)+'</div>':'');

  var moreHtml=
    (g[12]?'<div class="np-row r2">'+safeCard(g[12],'medium',12)+safeCard(g[13],'medium',13)+safeCard(g[14],'small',14)+'</div>':'')+
    (g[15]?'<div class="np-row r1">'+safeCard(g[15],'large',15)+safeCard(g[16],'medium',16)+'</div>':'')+
    (g[17]?'<div class="np-row r2">'+safeCard(g[17],'small',17)+safeCard(g[18],'small',18)+safeCard(g[19],'small',19)+'</div>':'');

  // Dynamic date
  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var nd=new Date();
  var dateStr=nd.getDate()+' '+months[nd.getMonth()]+' '+nd.getFullYear();

  return '<div class="top-ticker"><div class="tinner">'+th+'</div></div>'+
    '<div class="wrap">'+
    '<div class="masthead">'+
      '<div class="mey"><span class="ldot"></span>Live - '+dateStr+'</div>'+
      '<div class="mh1">ARGUS</div>'+
      '<div class="mtag">Many eyes. One map. Nothing unseen.</div>'+
      (function(){
        var activeRoomCount=Object.keys(RARTS).filter(function(r){return (RARTS[r]||[]).length>0;}).length;
        var totalRatings=ARTS.reduce(function(s,a){return s+a.hv;},0);
        // Count articles added today
        var today=new Date();today.setHours(0,0,0,0);
        var todayCount=ARTS.filter(function(a){
          if(!a.createdAt) return false;
          return new Date(a.createdAt)>=today;
        }).length;
        var todayStr=todayCount>0?'<span style="color:var(--green)">+'+todayCount+' today</span>':'';
        return '<div class="mmeta">'
          +'<span>'+activeRoomCount+' active rooms</span>'
          +'<span>'+ARTS.length+' perspectives</span>'
          +(todayStr?'<span>'+todayStr+'</span>':'')
          +(totalRatings>0?'<span>'+totalRatings+' human ratings</span>':'')
          +'</div>';
      }())+
    '</div>'+
    '<div class="rn-section"><div class="slabel">Right now <span class="slr" style="color:var(--red)">LIVE</span></div><div class="rn-items">'+rnHtml+'</div></div>'+
    buildEventOfMoment()+buildFpMacro()+makeSumPanel('front',null)+
    '<div class="ticker" style="margin:16px 0"><div class="tinner">'+th+'</div></div>'+
    buildCommunityStrip()+
    '<div id="fp-layout" style="display:grid;grid-template-columns:1fr 300px;gap:16px;margin-top:24px">'+
      '<div>'+
        '<div class="slabel">Top perspectives <span class="slr">ranked by human + AI - across all rooms</span></div>'+
        '<div class="np-grid" style="margin-top:12px">'+gridHtml+
        '<div id="more-articles" style="display:none">'+moreHtml+'</div>'+
        '<div style="text-align:center;padding:24px 0">'+
          '<button onclick="showMore()" id="show-more-btn" class="show-more-btn">Show more perspectives &nbsp;&#8595;</button>'+
        '</div>'+
        '</div>'+
      '</div>'+
      '<div class="np-sidebar">'+
        '<div class="slabel" style="margin-bottom:8px">Rooms</div>'+
        sbHtml+
      '</div>'+
    '</div>'+
  '</div>';
}

var roomArticleCache = {};

function buildRoomArticle(rid) {
  var pid = 'room-article-' + rid;
  // Check cache first
  if (roomArticleCache[rid]) {
    return renderRoomArticle(roomArticleCache[rid]);
  }
  // Fetch from Supabase
  var today = new Date().toISOString().split('T')[0];
  fetch(SUPABASE_URL + '/rest/v1/room_articles?room_id=eq.' + rid + '&order=updated_date.desc&limit=1', {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY
    }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var el = document.getElementById(pid);
    if (!el) return;
    if (!Array.isArray(data) || data.length === 0) {
      el.innerHTML = '';
      return;
    }
    var article = data[0];
    roomArticleCache[rid] = article;
    el.outerHTML = renderRoomArticle(article);
  })
  .catch(function() {
    var el = document.getElementById(pid);
    if (el) el.innerHTML = '';
  });

  return '<div id="' + pid + '" class="room-article"><div class="room-article-loading"><div class="spin"></div>Loading synthesis...</div></div>';
}

function renderRoomArticle(a) {
  if (!a || !a.headline) return '';

    + '<div class="room-article-eyebrow">'

function toggleSum(pid){

  else{b.classList.add('open');t.classList.add('open');if(!sumCache[pid]) loadSum(pid);else b.innerHTML=renderSum(sumCache[pid]);}

function loadSum(pid){
  var b=document.getElementById(pid+'-body');if(!b) return;
  b.innerHTML='<div class="sum-loading"><div class="spin"></div>Mapping arguments and narratives...</div>';
  var isRoom=pid!=='sumpanel-front';
  var rid=isRoom?pid.replace('sumpanel-',''):null;
  var sys='You reveal how different news sources interpret the same event differently.\n\nWRITING MODE: High compression.\n- Short sentences. One idea per sentence. No filler. No meta commentary.\n- Every sentence must add new information.\n- Each section must feel distinct. Do not blend ideas across sections.\n- Prioritize: clarity over completeness. Contrast over neutrality. Insight over coverage.\n\nCONCRETE LANGUAGE RULES:\n- Name specific sources always. Never say "mainstream media" or "some outlets".\n- Show differences directly: "Source A argues X. Source B argues Y."\n- Forbidden words: structural dynamics, institutional actors, asymmetrical, discursive, geopolitical paradigm, informational vectors.\n- Do NOT declare truth. Describe what each source emphasizes and omits.\n\nFINAL SECTION - PHILOSOPHICAL ZOOM-OUT:\n- Connect this topic to larger global patterns.\n- Think about: systems, values, power structures, historical cycles.\n- 2-4 short sentences. Make it striking. Make it memorable.\n\nReturn ONLY valid JSON, no markdown, no preamble.';
  var usr=isRoom?buildRoomPrompt(rid):buildFrontPrompt();
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,system:sys,messages:[{role:'user',content:usr}]})})
  .then(function(r){return r.json();})
  .then(function(data){
    var text=(data.content||[]).map(function(c){return c.text||'';}).join('');
    var clean=text.replace(/```json|```/g,'').trim();
    var parsed=JSON.parse(clean);
    sumCache[pid]=parsed;
    var b2=document.getElementById(pid+'-body');
    if(b2) b2.innerHTML=renderSum(parsed);
  })
  .catch(function(){
    var b2=document.getElementById(pid+'-body');
    if(b2) b2.innerHTML='<div class="sum-err">Could not generate. <span class="sum-regen" onclick="var p=this.closest(\'.sum-panel\').id;delete sumCache[p];loadSum(p)">Try again</span></div>';
  });
}
var SEC=[
  {key:'baseline',label:'Baseline',color:'var(--text2)'},
  {key:'narratives',label:'Narrative divergence',color:'var(--accent)'},
  {key:'for',label:'Argument for',color:'var(--green)'},
  {key:'against',label:'Argument against',color:'var(--red)'},
  {key:'emphasis',label:'Emphasis vs omission',color:'var(--amber)'},
  {key:'history',label:'Historical context',color:'var(--text3)'},
  {key:'gap',label:'Interpretation gap',color:'var(--purple)'},
  {key:'zoom',label:'Philosophical zoom-out',color:'#ff6ef7'}
];
function renderSum(d){
  var h='<div class="sum-secs">';
  var first=true;
  SEC.forEach(function(s){
    var val=d[s.key];if(!val) return;
    var body=Array.isArray(val)?'<ul>'+val.map(function(v){return '<li>'+v+'</li>';}).join('')+'</ul>':'<p>'+val+'</p>';

  });

  return h+'</div>';
}
function buildRoomPrompt(rid){
  var room=ROOMS[rid];var arts=RARTS[rid];
  var al=arts.map(function(a,i){return (i+1)+'. "'+a.title+'" by '+a.src+' (AI: '+a.ai+'/10, Human: '+hs(a).toFixed(1)+'/5, Perspective: '+(a.narr||'factual')+(a.pen.length?', flagged: '+a.pen.join(', '):'')+').\n   '+a.sum;}).join('\n\n');

}
function buildFrontPrompt(){

}

  }
}

async function signIn(email){
  var sb=getSupabase();
  var res=await sb.auth.signInWithOtp({
    email:email,
    options:{emailRedirectTo:window.location.href}
  });
  return res.error?null:true;
}

async function signOut(){
  await getSupabase().auth.signOut();
  currentUser=null;currentProfile=null;
  updateAuthUI();
  nav('front',null);
}

async function createProfile(handle,bio){
  if(!currentUser) return null;
  var res=await fetch(SUPABASE_URL+'/rest/v1/profiles',{
    method:'POST',
    headers:Object.assign({},SB_HEADERS,{'Prefer':'return=representation'}),
    body:JSON.stringify({id:currentUser.id,handle:handle,bio:bio||''})
  });
  var data=await res.json();
  if(Array.isArray(data)&&data[0]){currentProfile=data[0];updateAuthUI();return data[0];}
  return null;
}
var SB_HEADERS={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

function sbFetch(table,params){
  return fetch(SB_API+'/'+table+'?'+(params||''),{headers:SB_HEADERS}).then(function(r){return r.json();});
}
function sbInsert(table,data){
  return fetch(SB_API+'/'+table,{method:'POST',headers:SB_HEADERS,body:JSON.stringify(data)}).then(function(r){return r.json();});
}
function getSession(){
  var s=localStorage.getItem('hm_session');
  if(!s){s='sess_'+Math.random().toString(36).slice(2);localStorage.setItem('hm_session',s);}
  return s;
}

// Write rating to Supabase
function writeRating(articleId,qualityScore,trustScore){
  sbInsert('ratings',{article_id:articleId,session_id:getSession(),quality_score:qualityScore,trust_score:trustScore}).catch(function(){});
}

// Write comment to Supabase
function writeComment(articleId,content,handle){
  return sbInsert('comments',{article_id:articleId,session_id:getSession(),content:content,author_handle:handle||'Anonymous'});
}

// Write submission to Supabase
function writeSubmission(roomId,url,title,source,narrative,why,handle){
  return sbInsert('submissions',{room_id:roomId,url:url,title:title,source:source,narrative:narrative,why_relevant:why,submitter_handle:handle,session_id:getSession(),status:'pending'});
}

// Transform DB row → frontend article object
function transformArticle(a){
  return {
    id:a.id, room:a.room_id, rank:a.room_rank, title:a.title, src:a.source, url:a.url, aiImg:a.ai_image_url||null,
    hq:a.human_quality||0, ht:a.human_trust||0, hv:a.human_votes||0,
    ai:a.ai_score||0, conf:a.ai_confidence||0,
    narr:a.narrative, stance:a.stance, rankReason:a.rank_reason,
    dims:{Reasoning:a.dim_reasoning||0,Evidence:a.dim_evidence||0,Originality:a.dim_originality||0,
          Nuance:a.dim_nuance||0,Clarity:a.dim_clarity||0,Fairness:a.dim_fairness||0,Depth:a.dim_depth||0},
    pen:a.penalties||[], sum:a.summary, assess:a.assessment,
    gap:a.gap, gapv:a.gap_value||0, submitted:a.is_community||false,
    createdAt:a.created_at||null
  };
}
